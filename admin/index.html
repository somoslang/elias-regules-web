<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Elías Regules</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Space Grotesk', sans-serif; background: #f0ede7; -webkit-font-smoothing: antialiased; }

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #2f6a45; z-index: 100;
}
.login-card {
  background: #fff; border-radius: 16px; padding: 56px 48px; text-align: center;
  max-width: 360px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,.2);
}
.login-logo { font-size: 11px; font-weight: 600; letter-spacing: .32em; color: #2f6a45; text-transform: uppercase; margin-bottom: 20px; }
.login-title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; letter-spacing: -.02em; }
.login-sub { font-size: 13px; color: #999; margin-bottom: 36px; line-height: 1.5; }
.btn-login {
  background: #2f6a45; color: #fff; border: none; border-radius: 8px;
  padding: 14px 28px; font-size: 14px; font-weight: 600; letter-spacing: .04em;
  cursor: pointer; font-family: inherit; width: 100%; transition: background .2s;
}
.btn-login:hover { background: #256038; }

/* ── APP ── */
#app { display: flex; height: 100vh; }

/* SIDEBAR */
.sidebar { width: 248px; flex-shrink: 0; background: #2f6a45; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-brand { padding: 28px 24px 22px; border-bottom: 1px solid rgba(255,255,255,.1); }
.brand-er { font-size: 11px; font-weight: 700; letter-spacing: .3em; color: #fff; text-transform: uppercase; line-height: 1.5; }
.brand-sub { font-size: 9px; color: rgba(255,255,255,.4); letter-spacing: .2em; text-transform: uppercase; margin-top: 5px; }
.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-section-label { font-size: 9px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.35); padding: 14px 12px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 2px;
  color: rgba(255,255,255,.6); text-decoration: none; font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background .15s, color .15s; user-select: none;
}
.nav-item:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); }
.nav-item.active { background: rgba(255,255,255,.16); color: #fff; }
.nav-icon { font-size: 15px; opacity: .7; flex-shrink: 0; }
.sidebar-footer { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.1); }
.user-chip { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-email-text { font-size: 11px; color: rgba(255,255,255,.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btn-logout { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.5); border-radius: 6px; padding: 7px; font-size: 11px; font-family: inherit; cursor: pointer; letter-spacing: .04em; transition: all .15s; }
.btn-logout:hover { border-color: rgba(255,255,255,.45); color: rgba(255,255,255,.85); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header { padding: 28px 36px 20px; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; }
.main-title { font-size: 20px; font-weight: 600; color: #1a1a1a; letter-spacing: -.025em; }
.preview-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: #2f6a45; text-decoration: none; font-weight: 500; border: 1px solid #c5ddd0; border-radius: 6px; padding: 6px 12px; transition: background .15s; letter-spacing: .01em; }
.preview-btn:hover { background: #e8f3ed; }
.fields-scroll { flex: 1; overflow-y: auto; padding: 0 36px 8px; }

/* FIELD CARDS */
.field-group { background: #fff; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); overflow: hidden; }
.group-header { padding: 14px 22px 13px; border-bottom: 2px solid #f0ede7; background: #f8f6f2; display: flex; align-items: center; gap: 10px; }
.group-header::before { content: ''; display: block; width: 4px; height: 18px; border-radius: 3px; background: #2f6a45; flex-shrink: 0; }
.group-title { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #3a3a3a; }
.group-body { padding: 18px 22px; display: grid; gap: 16px; }
.group-body.two-col { grid-template-columns: 1fr 1fr; }
.field-label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 5px; letter-spacing: .01em; }
.field-hint { font-size: 11px; color: #bbb; margin-bottom: 5px; }
.field input, .field textarea { width: 100%; border: 1.5px solid #eaeaea; border-radius: 7px; padding: 9px 12px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fafafa; outline: none; transition: border-color .15s; line-height: 1.4; }
.field input:focus, .field textarea:focus { border-color: #2f6a45; background: #fff; box-shadow: 0 0 0 3px rgba(47,106,69,.08); }
.field textarea { resize: vertical; min-height: 72px; }

/* ── GALERÍA EDITOR ── */
.gal-editor { padding: 4px 0 24px; }
.gal-hint { font-size: 12px; color: #aaa; margin-bottom: 20px; }
.gal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.gal-card {
  position: relative; border-radius: 10px; overflow: hidden;
  background: #eee; aspect-ratio: 4/3;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}
.gal-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gal-card[draggable="true"] { cursor: grab; }
.gal-card.dragging { opacity: .35; outline: 2px dashed rgba(255,255,255,.5); }
.gal-card.drag-over { outline: 3px solid #2f6a45; outline-offset: 2px; }
.gal-card-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.55);
  opacity: 0; transition: opacity .2s;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
}
.gal-card:hover .gal-card-overlay { opacity: 1; }
.gal-actions { display: flex; gap: 6px; }
.gal-btn {
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3);
  color: #fff; border-radius: 6px; width: 32px; height: 32px;
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s; font-family: inherit;
}
.gal-btn:hover { background: rgba(255,255,255,.35); }
.gal-btn.del { background: rgba(200,40,40,.5); border-color: rgba(255,100,100,.4); }
.gal-btn.del:hover { background: rgba(200,40,40,.8); }
.gal-card-num {
  position: absolute; top: 6px; left: 6px;
  background: rgba(0,0,0,.55); color: #fff;
  font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px;
}

/* Add card */
.gal-add-card {
  aspect-ratio: 4/3; border-radius: 10px;
  border: 2px dashed #c5ddd0; background: #f6faf7;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; transition: border-color .2s, background .2s; color: #2f6a45;
}
.gal-add-card:hover { border-color: #2f6a45; background: #eaf3ed; }
.gal-add-icon { font-size: 28px; line-height: 1; }
.gal-add-label { font-size: 12px; font-weight: 600; letter-spacing: .04em; }
.gal-add-hint { font-size: 10px; color: #aaa; }

/* Upload progress */
.gal-upload-card {
  aspect-ratio: 4/3; border-radius: 10px; background: #f0f0f0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.gal-upload-name { font-size: 11px; color: #888; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gal-progress-bar { width: 80%; height: 3px; background: #ddd; border-radius: 2px; overflow: hidden; }
.gal-progress-fill { height: 100%; background: #2f6a45; width: 0%; transition: width .3s; }

/* SAVE BAR */
.save-bar { flex-shrink: 0; padding: 14px 36px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.save-status { font-size: 13px; color: #888; }
.save-status.ok { color: #2f6a45; font-weight: 500; }
.save-status.err { color: #c0392b; }
.btn-save { background: #2f6a45; color: #fff; border: none; border-radius: 8px; padding: 11px 24px; font-size: 13px; font-weight: 600; letter-spacing: .04em; cursor: pointer; font-family: inherit; transition: background .2s, opacity .2s; white-space: nowrap; }
.btn-save:hover { background: #256038; }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }
.loading-msg { padding: 36px; color: #bbb; font-size: 13px; }

/* ── PLANO EDITOR ── */
.plano-layout { display: flex; gap: 20px; align-items: flex-start; }
.plano-map-col { flex: 1.6; min-width: 0; }
.plano-panel-col { width: 290px; flex-shrink: 0; position: sticky; top: 0; }
.plano-hint-bar { font-size: 11px; color: #aaa; margin-bottom: 10px; line-height: 1.5; }
.plano-map-wrap { position: relative; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.12); background: #fff; cursor: crosshair; user-select: none; }
.plano-map-img { display: block; width: 100%; height: auto; pointer-events: none; }
.plano-dot { position: absolute; transform: translate(-50%,-50%); z-index: 5; cursor: pointer; }
.plano-dot-circle { width: 20px; height: 20px; border-radius: 50%; background: #2f6a45; border: 2.5px solid #fff; box-shadow: 0 2px 8px rgba(47,106,69,.5); transition: transform .15s, background .15s; }
.plano-dot:hover .plano-dot-circle { transform: scale(1.2); }
.plano-dot.selected .plano-dot-circle { background: #e8a020; box-shadow: 0 2px 10px rgba(232,160,32,.6); transform: scale(1.25); }
.plano-dot-label { position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); white-space: nowrap; background: #1a1a1a; color: #fff; font-size: 9px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; padding: 3px 7px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity .15s; }
.plano-dot:hover .plano-dot-label, .plano-dot.selected .plano-dot-label { opacity: 1; }
.plano-no-sel { padding: 40px 16px; text-align: center; color: #bbb; font-size: 13px; background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.plano-no-sel-icon { font-size: 30px; margin-bottom: 10px; }
.hs-photos-list { display: flex; flex-wrap: wrap; gap: 8px; }
.hs-photo-thumb { position: relative; width: 58px; height: 44px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.hs-photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.hs-photo-del { position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; border-radius: 50%; background: rgba(180,30,30,.85); border: none; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
.hs-add-photo { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; padding: 6px 12px; border: 1.5px dashed #c5ddd0; border-radius: 6px; color: #2f6a45; font-size: 11px; font-weight: 600; cursor: pointer; background: #f6faf7; transition: border-color .2s, background .2s; font-family: inherit; }
.hs-add-photo:hover { border-color: #2f6a45; background: #eaf3ed; }
.btn-del-hs { width: 100%; padding: 9px; border: 1.5px solid #f0b4b4; border-radius: 7px; background: #fff5f5; color: #c0392b; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; letter-spacing: .03em; transition: background .15s; margin-top: 4px; }
.btn-del-hs:hover { background: #fee; }
.btn-new-hs { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 12px; padding: 10px; border: 2px dashed #c5ddd0; border-radius: 8px; background: #f6faf7; color: #2f6a45; font-size: 12px; font-weight: 600; font-family: inherit; cursor: crosshair; letter-spacing: .02em; transition: border-color .2s, background .2s; }
.btn-new-hs:hover { border-color: #2f6a45; background: #eaf3ed; }
@media (max-width: 900px) {
  .plano-layout { flex-direction: column; }
  .plano-panel-col { width: 100%; position: static; }
}
</style>
</head>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <p class="login-logo">Elías Regules</p>
    <h1 class="login-title">Panel de administración</h1>
    <div class="field" style="text-align:left;margin-bottom:14px">
      <label class="field-label" for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="field" style="text-align:left;margin-bottom:8px">
      <label class="field-label" for="login-password">Contraseña</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <p id="login-error" style="color:#c0392b;font-size:12px;margin-bottom:12px;min-height:16px"></p>
    <button class="btn-login" id="login-btn">Iniciar sesión →</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-er">Elías<br>Regules</div>
      <div class="brand-sub">Panel de contenido</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Páginas</div>
      <div class="nav-item active" data-page="index"><span class="nav-icon">🏠</span> Inicio</div>
      <div class="nav-item" data-page="corporativo"><span class="nav-icon">🏢</span> Corporativo</div>
      <div class="nav-item" data-page="social"><span class="nav-icon">💍</span> Bodas &amp; Social</div>
      <div class="nav-section-label">Galerías</div>

      <div class="nav-section-label">Plano</div>
      <div class="nav-item" data-page="plano"><span class="nav-icon">🗺️</span> Plano interactivo</div>
      <div class="nav-section-label">General</div>
      <div class="nav-item" data-page="contacto"><span class="nav-icon">📞</span> Datos de contacto</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-email-text" id="user-email">—</div>
      </div>
      <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h1 class="main-title" id="main-title">Página de inicio</h1>
      <a class="preview-btn" id="preview-btn" href="/" target="_blank">↗ Ver página</a>
    </div>
    <div class="fields-scroll" id="fields-scroll">

    </div>
    <div class="save-bar">
      <div class="save-status" id="save-status"></div>
      <button class="btn-save" id="save-btn">Guardar cambios</button>
    </div>
  </main>
</div>

<input type="file" id="gal-file-input" accept="image/*" multiple style="display:none">
<input type="file" id="hs-file-input"  accept="image/*" multiple style="display:none">

/* ── Auth (Netlify Identity REST API directo, sin widget) ── */
const IDENTITY_URL = '/.netlify/identity';
let authToken = sessionStorage.getItem('ni_token') || '';
let authEmail = sessionStorage.getItem('ni_email') || '';

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function showApp(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-email').textContent = email;
  document.getElementById('user-avatar').textContent = email[0].toUpperCase();
  loadPage('index');
}
async function getToken() { return authToken; }

// Restaurar sesión si hay token guardado
if (authToken) {
  showApp(authEmail);
} else {
  showLogin();
}

// Login
document.getElementById('login-btn').onclick = async () => {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Completá email y contraseña.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    const res = await fetch(`${IDENTITY_URL}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `grant_type=password&username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error_description || `Error ${res.status}`);
    }
    const data = await res.json();
    authToken = data.access_token;
    authEmail = email;
    sessionStorage.setItem('ni_token', authToken);
    sessionStorage.setItem('ni_email', authEmail);
    showApp(email);
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Iniciar sesión →';
  }
};
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// Logout
document.getElementById('logout-btn').onclick = () => {
  authToken = ''; authEmail = '';
  sessionStorage.removeItem('ni_token');
  sessionStorage.removeItem('ni_email');
  showLogin();
};

/* ── Router ── */
async function loadPage(page) {
  currentPage = page;
  setStatus('');

  if (page === 'plano') {
    await loadPlano();
  } else if (GAL_PAGES[page]) {
    currentMode = 'gallery';
    document.getElementById('main-title').textContent = GAL_PAGES[page].label;
    document.getElementById('preview-btn').href = GAL_PAGES[page].preview;
    await loadGallery(page);
  } else {
    currentMode = 'fields';
    const cfg = PAGES[page];
    document.getElementById('main-title').textContent = cfg.label;
    document.getElementById('preview-btn').href = cfg.preview;
    await loadFields(page, cfg);

/* ── TEXT FIELDS ── */
async function loadFields(page, cfg) {
  document.getElementById('fields-scroll').innerHTML = '<p class="loading-msg">Cargando…</p>';
  try {
    const res  = await fetch(`/.netlify/functions/cms?path=_content/${page}.json`, { headers: { Authorization: `Bearer ${await getToken()}` } });
    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status} — ${body.slice(0, 300)}`);
    }
    const meta = await res.json();
    currentSha = meta.sha;
    const data = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, '')))));
    renderFields(cfg, data);
  } catch(e) {
    document.getElementById('fields-scroll').innerHTML = `<p class="loading-msg" style="color:#c0392b;font-size:12px;line-height:1.6">Error al cargar:<br>${e.message}</p>`;
  }
}

function renderFields(cfg, data) {
  const scroll = document.getElementById('fields-scroll');
  scroll.innerHTML = '';
  cfg.groups.forEach(group => {
    const card = document.createElement('div'); card.className = 'field-group';
    card.innerHTML = `<div class="group-header"><div class="group-title">${group.title}</div></div>`;
    const body = document.createElement('div');
    body.className = group.cols === 2 ? 'group-body two-col' : 'group-body';
    group.fields.forEach(f => {
      const wrap = document.createElement('div'); wrap.className = 'field';
      if (f.full) wrap.style.gridColumn = '1 / -1';
      wrap.innerHTML = `<label class="field-label">${f.label}</label>${f.hint ? `<div class="field-hint">${f.hint}</div>` : ''}`;
      const input = f.type === 'textarea'
        ? Object.assign(document.createElement('textarea'), { rows: 3 })
        : Object.assign(document.createElement('input'), { type: 'text' });
      input.value = data[f.key] ?? ''; input.dataset.key = f.key;
      wrap.appendChild(input); body.appendChild(wrap);
    });
    card.appendChild(body); scroll.appendChild(card);
  });
}

/* ── GALLERY ── */
async function loadGallery(page) {
  document.getElementById('fields-scroll').innerHTML = '<p class="loading-msg">Cargando galería…</p>';
  try {
    const res  = await fetch(`/.netlify/functions/cms?path=_content/${page}.json`, { headers: { Authorization: `Bearer ${await getToken()}` } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const meta = await res.json();
    currentSha = meta.sha;
    const data = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, '')))));
    galFotos = data.fotos || [];
    renderGallery();
  } catch(e) {
    document.getElementById('fields-scroll').innerHTML = `<p class="loading-msg" style="color:#c0392b">Error al cargar (${e.message}).</p>`;
  }
}

function renderGallery() {
  const scroll = document.getElementById('fields-scroll');
  scroll.innerHTML = '';

  const editor = document.createElement('div'); editor.className = 'gal-editor';
  editor.innerHTML = '<p class="gal-hint">Subí fotos, reordenalas y guardá. El sitio se actualiza en ~30 segundos.</p>';

  const grid = document.createElement('div'); grid.className = 'gal-grid'; grid.id = 'galGrid';

  galFotos.forEach((foto, i) => {
    grid.appendChild(makeCard(foto, i));
  });

  // Add card
  const addCard = document.createElement('div'); addCard.className = 'gal-add-card'; addCard.id = 'galAddCard';
  addCard.innerHTML = '<div class="gal-add-icon">+</div><div class="gal-add-label">Agregar fotos</div><div class="gal-add-hint">JPG · hasta 4 MB c/u</div>';
  addCard.onclick = () => document.getElementById('gal-file-input').click();
  grid.appendChild(addCard);

  editor.appendChild(grid);
  scroll.appendChild(editor);
}

function makeCard(foto, i) {
  const card = document.createElement('div'); card.className = 'gal-card'; card.dataset.img = foto.img; card.dataset.alt = foto.alt || '';
  card.draggable = true;
  card.innerHTML = `
    <span class="gal-card-num">${i + 1}</span>
    <img src="${foto.img}" loading="lazy" />
    <div class="gal-card-overlay">
      <div class="gal-actions">
        <button class="gal-btn del" title="Eliminar" onclick="deleteCard(this)">×</button>
      </div>
    </div>`;

  card.addEventListener('dragstart', e => {
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('#galGrid .gal-card').forEach(c => c.classList.remove('drag-over'));
    refreshNumbers();
  });
  card.addEventListener('dragover', e => {
    e.preventDefault();
    const dragging = document.querySelector('.dragging');
    if (!dragging || dragging === card) return;
    card.classList.add('drag-over');
    const grid = document.getElementById('galGrid');
    const addCard = document.getElementById('galAddCard');
    const cards = Array.from(grid.querySelectorAll('.gal-card'));
    const rect = card.getBoundingClientRect();
    const mid = rect.left + rect.width / 2;
    if (e.clientX < mid) grid.insertBefore(dragging, card);
    else grid.insertBefore(dragging, card.nextSibling);
    grid.appendChild(addCard);
  });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => { e.preventDefault(); card.classList.remove('drag-over'); });

  return card;
}

function moveCard(btn, dir) {
  const card  = btn.closest('.gal-card');
  const grid  = document.getElementById('galGrid');
  const cards = Array.from(grid.querySelectorAll('.gal-card'));
  const idx   = cards.indexOf(card);
  const addCard = document.getElementById('galAddCard');
  if (dir === 'up' && idx > 0)              grid.insertBefore(card, cards[idx - 1]);
  if (dir === 'dn' && idx < cards.length-1) grid.insertBefore(cards[idx + 1], card);
  // Ensure add button stays last
  grid.appendChild(addCard);
  refreshNumbers();
}

function deleteCard(btn) {
  if (!confirm('¿Eliminar esta foto de la galería?')) return;
  btn.closest('.gal-card').remove();
  refreshNumbers();
}

function refreshNumbers() {
  document.querySelectorAll('#galGrid .gal-card').forEach((c, i) => {
    c.querySelector('.gal-card-num').textContent = i + 1;
  });
}

/* ── Upload ── */
document.getElementById('gal-file-input').addEventListener('change', async function () {
  const files = Array.from(this.files);
  this.value = '';
  for (const file of files) {
    await uploadPhoto(file);
  }
});

async function uploadPhoto(file) {
  const grid    = document.getElementById('galGrid');
  const addCard = document.getElementById('galAddCard');
  if (!grid) return;

  // Progress placeholder
  const placeholder = document.createElement('div'); placeholder.className = 'gal-upload-card';
  placeholder.innerHTML = `<div class="gal-upload-name">${file.name}</div><div class="gal-progress-bar"><div class="gal-progress-fill" id="prog-${file.name.replace(/\W/g,'_')}"></div></div>`;
  grid.insertBefore(placeholder, addCard);

  const progEl = placeholder.querySelector('.gal-progress-fill');

  try {
    // Read as base64
    const b64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = e => res(e.target.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    if (progEl) progEl.style.width = '40%';

    const safeName = Date.now() + '-' + file.name.replace(/[^a-z0-9._-]/gi, '-').toLowerCase();

    // Upload to GitHub via Git Gateway
    const upRes = await fetch(`/.netlify/functions/cms?path=img/${safeName}`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${await getToken()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Foto: ${safeName}`, content: b64, branch: 'main' })
    });
    if (!upRes.ok) throw new Error(await upRes.text());
    if (progEl) progEl.style.width = '100%';

    const imgPath = `/img/${safeName}`;
    const newCard = makeCard({ img: imgPath, alt: '' }, document.querySelectorAll('#galGrid .gal-card').length);
    grid.insertBefore(newCard, placeholder);
    placeholder.remove();
    refreshNumbers();

  } catch (e) {
    placeholder.innerHTML = `<div class="gal-upload-name" style="color:#c0392b">Error al subir</div>`;
    setTimeout(() => placeholder.remove(), 3000);
  }
}

async function saveFields() {

  document.querySelectorAll('[data-key]').forEach(el => { newData[el.dataset.key] = el.value; });
  const body    = JSON.stringify(newData, null, 2) + '\n';

  const res = await fetch(`/.netlify/functions/cms?path=_content/${currentPage}.json`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${await getToken()}`, 'Content-Type': 'application/json' },

  });

async function saveGallery() {
  const fotos = Array.from(document.querySelectorAll('#galGrid .gal-card')).map(c => ({ img: c.dataset.img, alt: c.dataset.alt || '' }));
  const body    = JSON.stringify({ fotos }, null, 2) + '\n';

    method: 'PUT',
    headers: { Authorization: `Bearer ${await getToken()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `Galería actualizada`, content: encoded, sha: currentSha, branch: 'main' })
  });
  if (!res.ok) throw new Error(await res.text());
  currentSha = (await res.json()).content.sha;

/* ── PLANO EDITOR ── */
let planoData    = [];
let planoSha     = '';
let planoSelIdx  = -1;
let planoDragging = false;

async function loadPlano() {
  currentMode = 'plano';
  document.getElementById('main-title').textContent = 'Plano interactivo';
  document.getElementById('preview-btn').href = '/plano-interactivo.html';
  document.getElementById('fields-scroll').innerHTML = '<p class="loading-msg">Cargando plano…</p>';
  try {
    const res  = await fetch('/.netlify/functions/cms?path=_content/plano-hotspots.json', { headers: { Authorization: `Bearer ${await getToken()}` } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const meta = await res.json();
    planoSha  = meta.sha;
    planoData = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g,'')))));
    planoSelIdx = -1;
    renderPlanoEditor();
  } catch(e) {
    document.getElementById('fields-scroll').innerHTML = `<p class="loading-msg" style="color:#c0392b">Error: ${e.message}</p>`;
  }
}

function renderPlanoEditor() {
  const scroll = document.getElementById('fields-scroll');
  scroll.innerHTML = '';

  const layout  = document.createElement('div'); layout.className  = 'plano-layout';
  const mapCol  = document.createElement('div'); mapCol.className  = 'plano-map-col';
  const panelCol = document.createElement('div'); panelCol.className = 'plano-panel-col'; panelCol.id = 'planoPanel';

  mapCol.innerHTML = '<p class="plano-hint-bar">📍 Clickeá en el plano para agregar un punto nuevo · Clickeá un punto existente para editarlo · Arrastralo para moverlo</p>';

  const mapWrap = document.createElement('div'); mapWrap.className = 'plano-map-wrap'; mapWrap.id = 'planoMapWrap';
  mapWrap.innerHTML = '<img class="plano-map-img" src="/img/plano.png" alt="Plano" draggable="false" />';

  planoData.forEach((_, i) => mapWrap.appendChild(makePlanoDot(i)));

  mapWrap.addEventListener('click', e => {
    if (planoDragging) return;
    if (e.target.closest('.plano-dot')) return;
    const rect = mapWrap.getBoundingClientRect();
    const x = parseFloat(((e.clientX - rect.left) / rect.width * 100).toFixed(1));
    const y = parseFloat(((e.clientY - rect.top)  / rect.height * 100).toFixed(1));
    planoData.push({ label: 'Nuevo punto', tag: '', title: 'Nuevo punto', desc: '', x, y, photos: [] });
    const newIdx = planoData.length - 1;
    mapWrap.appendChild(makePlanoDot(newIdx));
    selectPlanoDot(newIdx);
  });

  mapCol.appendChild(mapWrap);
  layout.appendChild(mapCol);
  layout.appendChild(panelCol);
  scroll.appendChild(layout);

  renderPlanoPanel(planoSelIdx >= 0 ? planoSelIdx : -1);
}

function makePlanoDot(idx) {
  const hs  = planoData[idx];
  const dot = document.createElement('div');
  dot.className = 'plano-dot' + (idx === planoSelIdx ? ' selected' : '');
  dot.id = `plano-dot-${idx}`;
  dot.style.left = hs.x + '%';
  dot.style.top  = hs.y + '%';
  dot.innerHTML  = `<div class="plano-dot-circle"></div><div class="plano-dot-label">${hs.label || '—'}</div>`;

  let startX, startY, startLeft, startTop, isDragging = false;

  dot.addEventListener('pointerdown', e => {
    e.preventDefault(); e.stopPropagation();
    dot.setPointerCapture(e.pointerId);
    const rect = document.getElementById('planoMapWrap').getBoundingClientRect();
    startX = e.clientX; startY = e.clientY;
    startLeft = hs.x; startTop = hs.y;
    isDragging = false;
  });

  dot.addEventListener('pointermove', e => {
    if (!dot.hasPointerCapture(e.pointerId)) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (!isDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) { isDragging = true; planoDragging = true; }
    if (!isDragging) return;
    const rect = document.getElementById('planoMapWrap').getBoundingClientRect();
    hs.x = parseFloat(Math.max(0, Math.min(100, startLeft + dx / rect.width  * 100)).toFixed(1));
    hs.y = parseFloat(Math.max(0, Math.min(100, startTop  + dy / rect.height * 100)).toFixed(1));
    dot.style.left = hs.x + '%';
    dot.style.top  = hs.y + '%';
  });

  dot.addEventListener('pointerup', e => {
    const wasDragging = isDragging;
    isDragging = false;
    setTimeout(() => { planoDragging = false; }, 50);
    if (!wasDragging) selectPlanoDot(idx);
  });

  return dot;
}

function selectPlanoDot(idx) {
  planoSelIdx = idx;
  document.querySelectorAll('.plano-dot').forEach((d, i) => d.classList.toggle('selected', i === idx));
  renderPlanoPanel(idx);
}

function renderPlanoPanel(idx) {
  const panel = document.getElementById('planoPanel');
  if (!panel) return;
  if (idx < 0) {
    panel.innerHTML = '<div class="plano-no-sel"><div class="plano-no-sel-icon">📍</div>Seleccioná un punto del plano para editarlo, o clickeá en el plano para crear uno nuevo.</div>';
    return;
  }
  const hs = planoData[idx];

  panel.innerHTML = `
    <div class="field-group">
      <div class="group-header"><div class="group-title">Punto ${idx + 1} de ${planoData.length}</div></div>
      <div class="group-body">
        <div class="field"><label class="field-label">Nombre del punto</label>
          <input type="text" id="hs-label" value="${esc(hs.label)}" placeholder="Ej: Salón principal"></div>
        <div class="field"><label class="field-label">Etiqueta</label>
          <input type="text" id="hs-tag" value="${esc(hs.tag)}" placeholder="Ej: Interior"></div>
        <div class="field"><label class="field-label">Título del modal</label>
          <input type="text" id="hs-title" value="${esc(hs.title)}" placeholder="Ej: Salón principal"></div>
        <div class="field"><label class="field-label">Descripción</label>
          <textarea id="hs-desc" rows="3">${esc(hs.desc)}</textarea></div>
      </div>
    </div>
    <div class="field-group">
      <div class="group-header"><div class="group-title">Fotos</div></div>
      <div class="group-body">
        <div id="hs-photos-list" class="hs-photos-list"></div>
        <button class="hs-add-photo" id="hs-add-photo-btn">+ Subir foto</button>
      </div>
    </div>
    <button class="btn-del-hs" id="btn-del-hs">Eliminar este punto</button>
  `;

  renderHsPhotos(idx);

  const sync = (id, key) => document.getElementById(id).addEventListener('input', e => {
    planoData[planoSelIdx][key] = e.target.value;
    if (key === 'label') {
      const d = document.getElementById(`plano-dot-${planoSelIdx}`);
      if (d) d.querySelector('.plano-dot-label').textContent = e.target.value || '—';
    }
  });
  sync('hs-label', 'label');
  sync('hs-tag',   'tag');
  sync('hs-title', 'title');
  sync('hs-desc',  'desc');

  document.getElementById('hs-add-photo-btn').addEventListener('click', () => {
    const fi = document.getElementById('hs-file-input');
    fi.value = '';
    fi.onchange = async () => {
      for (const file of Array.from(fi.files)) await uploadHsPhoto(planoSelIdx, file);
      fi.onchange = null;
    };
    fi.click();
  });

  document.getElementById('btn-del-hs').addEventListener('click', () => {
    if (!confirm(`¿Eliminar el punto "${hs.label}"?`)) return;
    planoData.splice(idx, 1);
    planoSelIdx = -1;
    renderPlanoEditor();
  });
}

function renderHsPhotos(idx) {
  const hs   = planoData[idx];
  const list = document.getElementById('hs-photos-list');
  if (!list) return;
  list.innerHTML = '';
  (hs.photos || []).forEach((src, pi) => {
    const thumb = document.createElement('div'); thumb.className = 'hs-photo-thumb';
    thumb.innerHTML = `<img src="${src}" alt="" /><button class="hs-photo-del" title="Eliminar">×</button>`;
    thumb.querySelector('.hs-photo-del').addEventListener('click', () => {
      hs.photos.splice(pi, 1); renderHsPhotos(idx);
    });
    list.appendChild(thumb);
  });
}

async function compressImage(file, maxPx = 1500, quality = 0.85) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else       { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const b64 = c.toDataURL('image/jpeg', quality).split(',')[1];
      res(b64);
    };
    img.onerror = rej;
    img.src = url;
  });
}

async function uploadHsPhoto(idx, file) {
  const btn = document.getElementById('hs-add-photo-btn');
  if (btn) { btn.textContent = 'Subiendo…'; btn.disabled = true; }
  try {
    const b64 = await compressImage(file);
    const safeName = Date.now() + '-' + file.name.replace(/[^a-z0-9._-]/gi, '-').toLowerCase().replace(/\.\w+$/, '.jpg');
    const upRes = await fetch(`/.netlify/functions/cms?path=img/${safeName}`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${await getToken()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Foto plano: ${safeName}`, content: b64, branch: 'main' })
    });
    if (!upRes.ok) throw new Error(await upRes.text());
    planoData[idx].photos.push(`/img/${safeName}`);
    renderHsPhotos(idx);
  } catch(e) {
    alert('Error al subir: ' + e.message);
  } finally {
    if (btn) { btn.textContent = '+ Subir foto'; btn.disabled = false; }
  }
}

async function savePlano() {
  const body    = JSON.stringify(planoData, null, 2) + '\n';
  const encoded = btoa(unescape(encodeURIComponent(body)));
  const res = await fetch('/.netlify/functions/cms?path=_content/plano-hotspots.json', {
    method: 'PUT',
    headers: { Authorization: `Bearer ${await getToken()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'Admin: Plano interactivo', content: encoded, sha: planoSha, branch: 'main' })
  });
  if (!res.ok) throw new Error(await res.text());
  planoSha = (await res.json()).content.sha;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
