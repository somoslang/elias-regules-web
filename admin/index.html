<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Elías Regules</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Space Grotesk', sans-serif; background: #f0ede7; -webkit-font-smoothing: antialiased; }

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #2f6a45; z-index: 100;
}
.login-card {
  background: #fff; border-radius: 16px; padding: 56px 48px; text-align: center;
  max-width: 360px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,.2);
}
.login-logo {
  font-size: 11px; font-weight: 600; letter-spacing: .32em; color: #2f6a45;
  text-transform: uppercase; margin-bottom: 20px;
}
.login-title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; letter-spacing: -.02em; }
.login-sub { font-size: 13px; color: #999; margin-bottom: 36px; line-height: 1.5; }
.btn-login {
  background: #2f6a45; color: #fff; border: none; border-radius: 8px;
  padding: 14px 28px; font-size: 14px; font-weight: 600; letter-spacing: .04em;
  cursor: pointer; font-family: inherit; width: 100%; transition: background .2s;
}
.btn-login:hover { background: #256038; }

/* ── APP ── */
#app { display: flex; height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 248px; flex-shrink: 0; background: #2f6a45;
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-brand {
  padding: 28px 24px 22px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.brand-er {
  font-size: 11px; font-weight: 700; letter-spacing: .3em;
  color: #fff; text-transform: uppercase; line-height: 1.5;
}
.brand-sub {
  font-size: 9px; color: rgba(255,255,255,.4); letter-spacing: .2em;
  text-transform: uppercase; margin-top: 5px;
}
.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-section-label {
  font-size: 9px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
  color: rgba(255,255,255,.35); padding: 14px 12px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 2px;
  color: rgba(255,255,255,.6); text-decoration: none;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background .15s, color .15s; user-select: none;
}
.nav-item:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); }
.nav-item.active { background: rgba(255,255,255,.16); color: #fff; }
.nav-icon { font-size: 15px; opacity: .7; flex-shrink: 0; }
.sidebar-footer {
  padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.1);
}
.user-chip {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-email-text {
  font-size: 11px; color: rgba(255,255,255,.5); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.btn-logout {
  width: 100%; background: transparent; border: 1px solid rgba(255,255,255,.18);
  color: rgba(255,255,255,.5); border-radius: 6px; padding: 7px;
  font-size: 11px; font-family: inherit; cursor: pointer; letter-spacing: .04em;
  transition: all .15s;
}
.btn-logout:hover { border-color: rgba(255,255,255,.45); color: rgba(255,255,255,.85); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header {
  padding: 28px 36px 20px; flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: space-between;
}
.main-title { font-size: 20px; font-weight: 600; color: #1a1a1a; letter-spacing: -.025em; }
.preview-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; color: #2f6a45; text-decoration: none; font-weight: 500;
  border: 1px solid #c5ddd0; border-radius: 6px; padding: 6px 12px;
  transition: background .15s; letter-spacing: .01em;
}
.preview-btn:hover { background: #e8f3ed; }
.fields-scroll { flex: 1; overflow-y: auto; padding: 0 36px 8px; }

/* FIELD CARDS */
.field-group {
  background: #fff; border-radius: 12px; margin-bottom: 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  overflow: hidden;
}
.group-header {
  padding: 14px 22px 12px; border-bottom: 1px solid #f0f0f0;
  display: flex; align-items: center; gap: 8px;
}
.group-title {
  font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
  color: #aaa;
}
.group-body { padding: 18px 22px; display: grid; gap: 16px; }
.group-body.two-col { grid-template-columns: 1fr 1fr; }
.field {}
.field-label {
  display: block; font-size: 12px; font-weight: 600; color: #444;
  margin-bottom: 5px; letter-spacing: .01em;
}
.field-hint { font-size: 11px; color: #bbb; margin-bottom: 5px; }
.field input, .field textarea {
  width: 100%; border: 1.5px solid #eaeaea; border-radius: 7px;
  padding: 9px 12px; font-size: 13px; font-family: inherit; color: #1a1a1a;
  background: #fafafa; outline: none; transition: border-color .15s, background .15s;
  line-height: 1.4;
}
.field input:focus, .field textarea:focus {
  border-color: #2f6a45; background: #fff;
  box-shadow: 0 0 0 3px rgba(47,106,69,.08);
}
.field textarea { resize: vertical; min-height: 72px; }

/* SAVE BAR */
.save-bar {
  flex-shrink: 0; padding: 14px 36px;
  background: #fff; border-top: 1px solid #eee;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.save-status { font-size: 13px; color: #888; }
.save-status.ok { color: #2f6a45; font-weight: 500; }
.save-status.err { color: #c0392b; }
.btn-save {
  background: #2f6a45; color: #fff; border: none; border-radius: 8px;
  padding: 11px 24px; font-size: 13px; font-weight: 600; letter-spacing: .04em;
  cursor: pointer; font-family: inherit; transition: background .2s, opacity .2s;
  white-space: nowrap;
}
.btn-save:hover { background: #256038; }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }

/* Loading */
.loading-msg { padding: 36px; color: #bbb; font-size: 13px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <p class="login-logo">Elías Regules</p>
    <h1 class="login-title">Panel de administración</h1>
    <p class="login-sub">Editá los textos del sitio web fácilmente.</p>
    <button class="btn-login" id="login-btn">Iniciar sesión →</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-er">Elías<br>Regules</div>
      <div class="brand-sub">Panel de contenido</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Páginas</div>
      <div class="nav-item active" data-page="index">
        <span class="nav-icon">🏠</span> Inicio
      </div>
      <div class="nav-item" data-page="corporativo">
        <span class="nav-icon">🏢</span> Corporativo
      </div>
      <div class="nav-item" data-page="social">
        <span class="nav-icon">💍</span> Bodas &amp; Social
      </div>
      <div class="nav-section-label">General</div>
      <div class="nav-item" data-page="contacto">
        <span class="nav-icon">📞</span> Datos de contacto
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-email-text" id="user-email">—</div>
      </div>
      <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h1 class="main-title" id="main-title">Página de inicio</h1>
      <a class="preview-btn" id="preview-btn" href="/" target="_blank">↗ Ver página</a>
    </div>
    <div class="fields-scroll" id="fields-scroll">
      <p class="loading-msg">Cargando…</p>
    </div>
    <div class="save-bar">
      <div class="save-status" id="save-status"></div>
      <button class="btn-save" id="save-btn">Guardar cambios</button>
    </div>
  </main>
</div>

<script>
/* ── Configuración de campos ── */
const PAGES = {
  index: {
    label: 'Página de inicio',
    preview: '/',
    groups: [
      {
        title: 'Card · Corporativo',
        cols: 2,
        fields: [
          { key: 'corp_tag',   label: 'Etiqueta',  type: 'text' },
          { key: 'corp_cta',   label: 'Botón',     type: 'text' },
          { key: 'corp_title', label: 'Título',    type: 'text', full: true },
          { key: 'corp_sub',   label: 'Subtítulo', type: 'text', full: true },
        ]
      },
      {
        title: 'Card · Bodas & Celebraciones',
        cols: 2,
        fields: [
          { key: 'social_tag',   label: 'Etiqueta',  type: 'text' },
          { key: 'social_cta',   label: 'Botón',     type: 'text' },
          { key: 'social_title', label: 'Título',    type: 'text', full: true },
          { key: 'social_sub',   label: 'Subtítulo', type: 'text', full: true },
        ]
      }
    ]
  },
  corporativo: {
    label: 'Página Corporativo',
    preview: '/corporativo.html',
    groups: [
      {
        title: 'Sección hero',
        fields: [
          { key: 'hero_h1',  label: 'Titular principal', type: 'text',     hint: 'HTML permitido — ej: Eventos que <strong>sorprenden</strong>.' },
          { key: 'hero_sub', label: 'Subtítulo',         type: 'textarea' },
        ]
      }
    ]
  },
  social: {
    label: 'Bodas & Social',
    preview: '/social.html',
    groups: [
      {
        title: 'Sección hero',
        fields: [
          { key: 'hero_h1',  label: 'Titular principal', type: 'text',     hint: 'HTML permitido — ej: El día más <em>especial</em>.' },
          { key: 'hero_sub', label: 'Subtítulo',         type: 'textarea' },
        ]
      }
    ]
  },
  contacto: {
    label: 'Datos de contacto',
    preview: '/corp-contacto.html',
    groups: [
      {
        title: 'Teléfono',
        cols: 2,
        fields: [
          { key: 'phone',      label: 'Número local',         type: 'text', hint: 'Ej: 095 893 475' },
          { key: 'phone_intl', label: 'Número internacional', type: 'text', hint: 'Ej: +598 95 893 475' },
        ]
      }
    ]
  }
};

let currentPage = 'index';
let currentSha  = '';

/* ── Identity — registrar handlers ANTES de init ── */
netlifyIdentity.on('init', user => user ? showApp(user) : showLogin());
netlifyIdentity.on('login', user => { netlifyIdentity.close(); showApp(user); });
netlifyIdentity.on('logout', showLogin);

netlifyIdentity.init({ APIUrl: 'https://eliasregules.lang.uy/.netlify/identity' });

document.getElementById('login-btn').onclick  = () => netlifyIdentity.open('login');
document.getElementById('logout-btn').onclick = () => netlifyIdentity.logout();

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-avatar').textContent = user.email[0].toUpperCase();
  loadPage('index');
}

function getToken() {
  return netlifyIdentity.currentUser()?.token?.access_token ?? '';
}

/* ── Nav ── */
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    loadPage(el.dataset.page);
  });
});

/* ── Load ── */
async function loadPage(page) {
  currentPage = page;
  const cfg = PAGES[page];
  document.getElementById('main-title').textContent = cfg.label;
  document.getElementById('preview-btn').href = cfg.preview;
  document.getElementById('save-status').textContent = '';
  document.getElementById('save-status').className = 'save-status';
  document.getElementById('fields-scroll').innerHTML = '<p class="loading-msg">Cargando…</p>';

  try {
    const res = await fetch(`/.netlify/git/github/contents/_content/${page}.json`, {
      headers: { Authorization: `Bearer ${getToken()}` }
    });
    if (!res.ok) throw new Error(res.status);
    const meta = await res.json();
    currentSha = meta.sha;
    const data = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, '')))));
    renderFields(cfg, data);
  } catch (e) {
    document.getElementById('fields-scroll').innerHTML =
      '<p class="loading-msg" style="color:#c0392b">Error al cargar. Recargá la página.</p>';
  }
}

/* ── Render ── */
function renderFields(cfg, data) {
  const scroll = document.getElementById('fields-scroll');
  scroll.innerHTML = '';

  cfg.groups.forEach(group => {
    const card = document.createElement('div');
    card.className = 'field-group';

    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `<div class="group-title">${group.title}</div>`;
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = group.cols === 2 ? 'group-body two-col' : 'group-body';

    group.fields.forEach(f => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      if (f.full) wrap.style.gridColumn = '1 / -1';

      const label = document.createElement('label');
      label.className = 'field-label';
      label.textContent = f.label;
      wrap.appendChild(label);

      if (f.hint) {
        const hint = document.createElement('div');
        hint.className = 'field-hint';
        hint.textContent = f.hint;
        wrap.appendChild(hint);
      }

      const input = f.type === 'textarea'
        ? Object.assign(document.createElement('textarea'), { rows: 3 })
        : Object.assign(document.createElement('input'), { type: 'text' });

      input.value = data[f.key] ?? '';
      input.dataset.key = f.key;
      wrap.appendChild(input);
      body.appendChild(wrap);
    });

    card.appendChild(body);
    scroll.appendChild(card);
  });
}

/* ── Save ── */
document.getElementById('save-btn').onclick = async () => {
  const btn    = document.getElementById('save-btn');
  const status = document.getElementById('save-status');

  btn.disabled = true;
  btn.textContent = 'Guardando…';
  status.textContent = '';
  status.className = 'save-status';

  const newData = {};
  document.querySelectorAll('[data-key]').forEach(el => { newData[el.dataset.key] = el.value; });

  try {
    const body = JSON.stringify(newData, null, 2) + '\n';
    const encoded = btoa(unescape(encodeURIComponent(body)));

    const res = await fetch(`/.netlify/git/github/contents/_content/${currentPage}.json`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `Admin: ${PAGES[currentPage].label}`,
        content: encoded,
        sha: currentSha,
        branch: 'main',
      })
    });

    if (!res.ok) throw new Error(await res.text());
    const result = await res.json();
    currentSha = result.content.sha;
    status.textContent = '✓ Guardado. El sitio se actualiza en ~20 segundos.';
    status.className = 'save-status ok';
  } catch (e) {
    status.textContent = '✗ Error al guardar. Intentá de nuevo.';
    status.className = 'save-status err';
  }

  btn.disabled = false;
  btn.textContent = 'Guardar cambios';
};
</script>
</body>
</html>
