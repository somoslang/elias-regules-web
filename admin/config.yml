backend:
  name: git-gateway
  branch: main

site_url: https://eliasregules.com
display_url: https://eliasregules.com

media_folder: img
public_folder: /img

collections:
  - name: "site"
    label: "Contenido"
    files:
      - name: "contacto"
        label: "Datos de contacto"
        file: "_content/contacto.json"
        format: json
        fields:
          - label: "Teléfono"
            name: "phone"
            widget: "string"
            hint: "Sin código de país. Ej: 095 893 475"
          - label: "Teléfono internacional"
            name: "phone_intl"
            widget: "string"
            hint: "Con código de país. Ej: +598 95 893 475"

      - name: "index"
        label: "Página de inicio"
        file: "_content/index.json"
        format: json
        fields:
          - label: "Card Corporativo – etiqueta"
            name: "corp_tag"
            widget: "string"
          - label: "Card Corporativo – título"
            name: "corp_title"
            widget: "string"
          - label: "Card Corporativo – subtítulo"
            name: "corp_sub"
            widget: "string"
          - label: "Card Corporativo – botón"
            name: "corp_cta"
            widget: "string"
          - label: "Card Bodas – etiqueta"
            name: "social_tag"
            widget: "string"
          - label: "Card Bodas – título"
            name: "social_title"
            widget: "string"
          - label: "Card Bodas – subtítulo"
            name: "social_sub"
            widget: "string"
          - label: "Card Bodas – botón"
            name: "social_cta"
            widget: "string"

      - name: "corporativo"
        label: "Página Corporativo"
        file: "_content/corporativo.json"
        format: json
        fields:
          - label: "Título hero"
            name: "hero_h1"
            widget: "string"
            hint: "Podés usar <strong>negrita</strong> con etiquetas HTML"
          - label: "Subtítulo hero"
            name: "hero_sub"
            widget: "text"

      - name: "social"
        label: "Página Bodas & Social"
        file: "_content/social.json"
        format: json
        fields:
          - label: "Título hero"
            name: "hero_h1"
            widget: "string"
            hint: "Podés usar <em>cursiva</em> con etiquetas HTML"
          - label: "Subtítulo hero"
            name: "hero_sub"
            widget: "text"

      - name: "corp-galeria"
        label: "Galería — Corporativo"
        file: "_content/corp-galeria.json"
        format: json
        fields:
          - label: "Fotos"
            name: "fotos"
            widget: "list"
            label_singular: "Foto"
            hint: "Subí las fotos y arrastralas para cambiar el orden."
            fields:
              - label: "Imagen"
                name: "img"
                widget: "image"
              - label: "Descripción (opcional)"
                name: "alt"
                widget: "string"
                required: false
                default: ""

      - name: "social-galeria"
        label: "Galería — Bodas & Celebraciones"
        file: "_content/social-galeria.json"
        format: json
        fields:
          - label: "Fotos"
            name: "fotos"
            widget: "list"
            label_singular: "Foto"
            hint: "Subí las fotos y arrastralas para cambiar el orden."
            fields:
              - label: "Imagen"
                name: "img"
                widget: "image"
              - label: "Descripción (opcional)"
                name: "alt"
                widget: "string"
                required: false
                default: ""
